apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-screensaver
  namespace: immich-screensaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-screensaver
  template:
    metadata:
      labels:
        app: immich-screensaver
    spec:
      # Create once: kubectl create secret docker-registry ghcr-pull -n immich-screensaver ...
      # See README — GHCR often still denies anonymous pulls (401) even when the package is "public".
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: immich-screensaver
          image: immich-screensaver:1.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: immich-screensaver-config
          # Required secretRef blocks the pod if the secret is missing (Argo sync alone is not enough).
          # Optional key: pod starts; app returns 503 until you add the real key.
          env:
            - name: IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-screensaver-secrets
                  key: IMMICH_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
