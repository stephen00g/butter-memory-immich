<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Immich Screensaver</title>
    <link rel="stylesheet" href="/style.css?v=1.1.2" />
    <link rel="manifest" href="/manifest.webmanifest?v=1.1.2" />
  </head>
  <body>
    <div id="stage" class="stage mode-classic" aria-hidden="true">
      <div id="stack-mode" class="stack-mode">
        <div id="layer-a" class="slide-layer">
          <div class="slide-main">
            <img class="photo" alt="" decoding="async" />
          </div>
          <div class="slide-reflection" aria-hidden="true">
            <img class="photo photo--reflect" alt="" decoding="async" />
          </div>
        </div>
        <div id="layer-b" class="slide-layer slide-layer--hidden">
          <div class="slide-main">
            <img class="photo" alt="" decoding="async" />
          </div>
          <div class="slide-reflection" aria-hidden="true">
            <img class="photo photo--reflect" alt="" decoding="async" />
          </div>
        </div>
      </div>
      <div id="panels-mode" class="panels-mode" hidden>
        <!-- tvOS-style: vertical strips, each with its own slow drift (parallax-like) -->
        <div class="panel-col panel-col--1">
          <div class="panel-col-scroll"><img class="panel-img" alt="" decoding="async" /></div>
        </div>
        <div class="panel-col panel-col--2">
          <div class="panel-col-scroll"><img class="panel-img" alt="" decoding="async" /></div>
        </div>
        <div class="panel-col panel-col--3">
          <div class="panel-col-scroll"><img class="panel-img" alt="" decoding="async" /></div>
        </div>
        <div class="panel-col panel-col--4">
          <div class="panel-col-scroll"><img class="panel-img" alt="" decoding="async" /></div>
        </div>
        <div class="panel-col panel-col--5">
          <div class="panel-col-scroll"><img class="panel-img" alt="" decoding="async" /></div>
        </div>
      </div>
    </div>

    <aside id="photo-info" class="photo-info" aria-live="polite" hidden></aside>

    <div id="hud" class="hud">
      <button type="button" id="btn-settings" class="hud__btn" aria-haspopup="dialog">Settings</button>
      <button type="button" id="btn-fullscreen" class="hud__btn">Fullscreen</button>
      <span id="status" class="hud__status"></span>
    </div>

    <div id="settings-backdrop" class="settings-backdrop" hidden></div>
    <div
      id="settings-dialog"
      class="settings-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-title"
      hidden
    >
      <div class="settings-dialog__inner">
        <h2 id="settings-title" class="settings-dialog__title">Screensaver</h2>
        <p class="settings-dialog__hint">Preferences are saved in this browser only.</p>

        <label class="settings-field">
          <span class="settings-field__label">Style</span>
          <select id="setting-mode" class="settings-field__input"></select>
        </label>
        <p class="settings-field__desc" id="mode-desc"></p>

        <label class="settings-field">
          <span class="settings-field__label">Seconds per photo</span>
          <input id="setting-interval" type="range" min="5" max="120" step="1" class="settings-field__range" />
          <span id="setting-interval-value" class="settings-field__value"></span>
        </label>

        <label class="settings-field settings-field--row">
          <input id="setting-show-info" type="checkbox" />
          <span>Show photo details (place, people, date)</span>
        </label>

        <div class="settings-dialog__actions">
          <button type="button" id="btn-settings-close" class="hud__btn">Done</button>
        </div>
      </div>
    </div>

    <script src="/app.js?v=1.1.2" type="module"></script>
  </body>
</html>
