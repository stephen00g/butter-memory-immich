<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Immich Screensaver</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="stage" aria-hidden="true">
      <img id="layer-a" class="photo" alt="" decoding="async" />
      <img id="layer-b" class="photo photo--hidden" alt="" decoding="async" />
    </div>
    <div id="hud" class="hud">
      <button type="button" id="btn-fullscreen" class="hud__btn">Fullscreen</button>
      <span id="status" class="hud__status"></span>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
